# SIGALU – Deploy Flask backend to Azure Web App
name: Build and deploy Python app to Azure Web App - sigalu-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_PATH: 'backend/azure-webapp'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd ${{ env.APP_PATH }}
          pip install -r requirements.txt

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: ${{ env.APP_PATH }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_89050B4AF21640F6B790EF7ACB3EFA80 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3DB7F21E89854BF4BE3A37184D9D1603 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C298C48F61364EFFA3F5564716BCA5E5 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'sigalu-api'
          slot-name: 'Production'
          package: '.'
