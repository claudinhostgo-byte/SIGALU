# SIGALU – Deploy Flask app to Azure App Service
name: Deploy Flask backend to Azure Web App - sigalu-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  APP_PATH: 'backend/azure-webapp'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd ${{ env.APP_PATH }}
          pip install -r requirements.txt

      - name: Zip app for deployment
        run: |
          cd ${{ env.APP_PATH }}
          zip -r ${{ github.workspace }}/app.zip . -x "*.pyc" -x "__pycache__/*"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1727E91E7F73401A8852C3408AB02489 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C2B0C306FDAF4081896A41BC60C49446 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B3B69BFB079B40B3BED0B4EABE89499F }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'sigalu-api'
          package: ${{ github.workspace }}/app.zip
